<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLUX | Premium E-commerce</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">FLUX<span>.</span></div>
        <ul class="nav-links">
            <li><a href="#shop">Shop</a></li>
            <li><button id="cart-icon-btn" class="cart-trigger">Cart (<span id="cart-count">0</span>)</button></li>
        </ul>
    </nav>

    <div id="side-cart" class="side-cart">
        <div class="cart-header">
            <h3>Your Cart</h3>
            <button id="close-cart">&times;</button>
        </div>
        <div id="cart-items-list" class="cart-content">
            <p class="empty-msg">Your cart is empty.</p>
        </div>
        <div class="cart-footer">
            <button class="checkout-btn">Checkout Now</button>
        </div>
    </div>

    <main class="shop-container" id="shop">
        <h2 class="section-title">Featured Products</h2>
        <div class="product-grid" id="main-grid">
            <div class="product-card" data-type="tech" onclick="addToRecent('Flux Phone Z', 'https://images.unsplash.com/photo-1546054454-aa26e2b734c7?w=500')">
                <img src="https://images.unsplash.com/photo-1546054454-aa26e2b734c7?w=500" class="product-img">
                <div class="product-info">
                    <h3>Flux Phone Z</h3>
                    <p class="price">$799</p>
                    <button class="add-btn" onclick="event.stopPropagation(); addToCart('Flux Phone Z', 799)">Add to Cart</button>
                </div>
            </div>
            <div class="product-card" data-type="fashion" onclick="addToRecent('Oversized Tee', 'https://images.unsplash.com/photo-1523381210434-271e8be1f52b?w=500')">
                <img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b?w=500" class="product-img">
                <div class="product-info">
                    <h3>Oversized Tee</h3>
                    <p class="price">$35</p>
                    <button class="add-btn" onclick="event.stopPropagation(); addToCart('Oversized Tee', 35)">Add to Cart</button>
                </div>
            </div>
        </div>

        <section class="extra-section">
            <h3 class="sub-title">Recently Viewed</h3>
            <div class="recent-grid" id="recent-grid">
                <p class="empty-msg">No recently viewed items.</p>
            </div>
        </section>

        <section class="extra-section">
            <h3 class="sub-title">You May Also Like</h3>
            <div class="product-grid mini">
                <div class="product-card mini-card">
                    <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=300" class="product-img">
                    <div class="product-info">
                        <h4>Flux Buds</h4>
                        <p class="price">$129</p>
                    </div>
                </div>
                <div class="product-card mini-card">
                    <img src="https://images.unsplash.com/photo-1525966222134-fcfa99b8ae77?w=300" class="product-img">
                    <div class="product-info">
                        <h4>Classic Kick</h4>
                        <p class="price">$85</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLUX | Pro E-commerce</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="announcement-bar">
        <marquee>SECURE CHECKOUT ENABLED | PAY WITH VISA, MASTERCARD, OR BITCOIN</marquee>
    </div>

    <nav class="navbar">
        <div class="logo">FLUX<span>.</span></div>
        
        <div class="hamburger" id="hamburger">
            <div class="line"></div>
            <div class="line"></div>
            <div class="line"></div>
        </div>

        <ul class="nav-links" id="nav-links">
            <li><a href="#shop" onclick="toggleMenu()">Shop</a></li>
            <li><a href="#" onclick="toggleMenu()">Electronics</a></li>
            <li><a href="#" onclick="toggleMenu()">Apparel</a></li>
            <li><button id="cart-icon-btn" class="cart-trigger">Cart (<span id="cart-count">0</span>)</button></li>
        </ul>
    </nav>

    <div id="side-cart" class="side-cart">
        <div class="cart-header">
            <h3>Your Cart</h3>
            <button id="close-cart">&times;</button>
        </div>
        <div id="cart-items-list" class="cart-content">
            <p class="empty-msg">Cart is empty.</p>
        </div>
        <div class="cart-footer">
            <div class="total-price">Total: $<span id="cart-total">0</span></div>
            <button class="checkout-btn" onclick="openPayment()">Proceed to Payment</button>
        </div>
    </div>

    <div id="payment-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closePayment()">&times;</span>
            <h3>Secure Payment</h3>
            <div class="payment-form">
                <input type="text" id="card-num" placeholder="Card Number" maxlength="19">
                <button class="pay-now-btn" id="pay-button" onclick="processPayment()">Pay Now</button>
            </div>
            <div id="payment-success" class="success-msg">✅ Payment Successful!</div>
        </div>
    </div>

    <main class="shop-container" id="shop">
        <div class="product-grid">
            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1546054454-aa26e2b734c7?w=500" class="product-img">
                <div class="product-info">
                    <h3>Flux Phone Z</h3>
                    <p class="price">$799</p>
                    <button class="add-btn" onclick="addToCart('Flux Phone Z', 799)">Add to Cart</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>

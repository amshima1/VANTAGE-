<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLUX | Advanced Ecosystem</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo" onclick="location.reload()">FLUX</div>
            <div class="nav-icons">
                <span class="icon" id="cart-icon-trigger">BAG (<span id="cart-count">0</span>)</span>
            </div>
        </div>
    </nav>

    <div id="cart-sidebar" class="cart-sidebar">
        <div class="cart-header"><h2>YOUR BAG</h2><button id="close-cart">&times;</button></div>
        <div id="cart-items-container" class="cart-items"></div>
        <div class="cart-footer">
            <div class="cart-total"><span>TOTAL</span><span id="cart-subtotal">$0.00</span></div>
            <button id="checkout-btn" class="primary-btn">SECURE CHECKOUT</button>
        </div>
    </div>
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <main id="main-content">
        <section id="shop-section">
            <div id="product-grid" class="grid-view"></div>
        </section>

        <section id="detail-section" class="hidden">
            <div id="detail-content"></div>
        </section>

        <section id="payment-overlay" class="payment-modal hidden">
            <div class="payment-card">
                <h3>PAYMENT DETAILS</h3>
                <div class="card-input-box">
                    <input type="text" placeholder="Card Number" maxlength="16">
                    <div class="flex">
                        <input type="text" placeholder="MM/YY">
                        <input type="text" placeholder="CVC">
                    </div>
                </div>
                <button id="confirm-payment-btn" class="primary-btn">PAY NOW</button>
                <p id="payment-status"></p>
            </div>
        </section>
    </main>

    <div id="chat-widget" class="chat-closed">
        <div id="chat-header">FLUX ASSISTANT</div>
        <div id="chat-body">
            <div class="msg bot">Hello! How can I help you today?</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="Ask about shipping, sizes...">
            <button id="send-chat">↑</button>
        </div>
    </div>
    <button id="chat-trigger">💬</button>

    <div id="toast-container"></div>
    <script src="app.js"></script>
</body>
</html>

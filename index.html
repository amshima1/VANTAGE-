<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VELORA | Luxury Modern Essentials</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="main-header">
        <nav class="navbar">
            <div class="menu-toggle" id="mobile-menu">
                <i class="fas fa-bars"></i>
            </div>
            <div class="logo">VELORA<span>.</span></div>
            <div class="cart-icon" id="cart-btn">
                <i class="fas fa-shopping-bag"></i>
                <span id="cart-count">0</span>
            </div>
        </nav>

        <div class="side-menu" id="side-menu">
            <button class="close-menu" id="close-menu">&times;</button>
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#full-collection">Shop Collection</a></li>
                <li><a href="#">Our Story</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </div>

        <div class="search-container">
            <div class="search-wrapper">
                <input type="text" placeholder="Search products...">
                <i class="fas fa-search"></i>
            </div>
        </div>
    </header>

    <main>
        <section class="hero">
            <img src="hero-bg.jpg" alt="Velora Hero" class="hero-image">
            <div class="hero-overlay"></div>
            <div class="hero-content">
                <h1>The Velora Collection</h1>
            </div>
        </section>

        <section class="products-container" id="full-collection">
            <h2 class="section-title">The Full Collection</h2>
            <div class="product-grid">
                <div class="product-card">
                    <img src="Flux1-front.jpg" alt="Flux Elite">
                    <div class="product-info"><h3>Flux Elite</h3><p>$120.00</p><button class="add-btn">ADD TO CART</button></div>
                </div>
                <div class="product-card">
                    <img src="Wanni-Fuga-Anagram-Slip-dress.jpg" alt="Anagram Slip">
                    <div class="product-info"><h3>Anagram Slip Dress</h3><p>$220.00</p><button class="add-btn">ADD TO CART</button></div>
                </div>
                <div class="product-card">
                    <img src="Flux3-side.jpg" alt="Flux Side-Drape">
                    <div class="product-info"><h3>Flux Side-Drape</h3><p>$160.00</p><button class="add-btn">ADD TO CART</button></div>
                </div>
                <div class="product-card">
                    <img src="Flux4-front.jpg" alt="Executive Set">
                    <div class="product-info"><h3>Executive Set</h3><p>$210.00</p><button class="add-btn">ADD TO CART</button></div>
                </div>
                </div>
        </section>
    </main>

    <div class="chat-wrapper">
        <button class="chat-toggle" id="chat-toggle"><i class="fas fa-comment-dots"></i></button>
        <div class="chat-container" id="chat-container">
            <div class="chat-header"><span>Aura Assistant</span><button id="close-chat">&times;</button></div>
            <div class="chat-box" id="chat-box">
                <div class="bot-msg">Hello, I'm Aura. How can I help you?</div>
            </div>
            <div class="chat-input">
                <input type="text" placeholder="Type a message..." id="user-input">
                <button id="send-btn"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <footer class="footer-black">
        <div class="social-links">
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-twitter"></i></a>
            <a href="#"><i class="fab fa-facebook-f"></i></a>
        </div>
        <p>&copy; 2026 VELORA. All Rights Reserved.</p>
    </footer>

    <script src="./script.js"></script>
</body>
</html>

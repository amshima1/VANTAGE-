<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VELORA | Luxury Modern Essentials</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="menu-toggle" id="mobile-menu"><span class="bar"></span><span class="bar"></span><span class="bar"></span></div>
            <div class="logo">VELORA<span>.</span></div>
            <div class="cart-icon" id="cart-btn">👜 <span id="cart-count">0</span></div>
        </nav>
        <div class="search-section">
            <div class="search-box">
                <input type="text" placeholder="Search products...">
                <span class="search-icon">🔍</span>
            </div>
        </div>
    </header>

    <section class="hero">
        <img src="hero-bg.jpg" alt="Velora Hero" class="hero-image">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1>The Velora Collection</h1>
            <a href="#featured" class="btn">SHOP NOW</a>
        </div>
    </section>

    <section class="products-container" id="featured">
        <h2 class="section-title">Featured Collection</h2>
        <div class="product-grid">
            <div class="product-card">
                <img src="Flux3-side.jpg" alt="Flux Side-Drape">
                <div class="product-info"><h3>Flux Side-Drape</h3><p>$160.00</p><button class="add-btn">ADD TO CART</button></div>
            </div>
            <div class="product-card">
                <img src="Flux4-front.jpg" alt="Executive Set">
                <div class="product-info"><h3>Executive Set</h3><p>$210.00</p><button class="add-btn">ADD TO CART</button></div>
            </div>
        </div>
    </section>

    <div class="checkout-modal" id="checkout-modal">
        <div class="modal-content">
            <button class="close-btn" id="close-modal">&times;</button>
            <h2>Checkout</h2>
            <p>Items in Cart: <span id="modal-cart-count">0</span></p>
            <div class="pay-btn-group">
                <button class="pay-btn stripe"><i class="fab fa-stripe"></i> Pay with Card</button>
                <button class="pay-btn paypal"><i class="fab fa-paypal"></i> Pay with PayPal</button>
            </div>
        </div>
    </div>

    <div class="chat-wrapper">
        <button class="chat-toggle" id="chat-toggle"><i class="fas fa-comment"></i></button>
        <div class="chat-container" id="chat-container">
            <div class="chat-header">
                <span>Aura AI Assistant</span>
                <button id="close-chat">&times;</button>
            </div>
            <div class="chat-box" id="chat-box">
                <div class="bot-msg">Hello, I'm Aura. How can I help?</div>
            </div>
            <div class="chat-input">
                <input type="text" id="user-input" placeholder="Message...">
                <button id="send-btn"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <footer class="footer-black">
        <div class="social-icons">
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-twitter"></i></a>
            <a href="#"><i class="fab fa-facebook-f"></i></a>
        </div>
        <p>&copy; 2026 VELORA</p>
    </footer>

    <script src="./script.js"></script>
</body>
</html>

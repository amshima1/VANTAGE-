<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLUX | Luxury Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <div class="logo">F L U X</div>
        <div class="search-bar"><input type="text" placeholder="Search"></div>
    </header>

    <main>
        <section class="hero-banner" style="background-image: url('hero-bg.jpg');">
            <div class="hero-overlay">
                <h1>SPRING READY?</h1>
                <button class="shop-now">SHOP NOW</button>
            </div>
        </section>

        <h2 class="section-title">NEW ARRIVALS</h2>
        <div class="horizontal-scroller" id="flux-grid"></div>

        <div id="likes-section" class="likes-container"></div>
    </main>
    <script src="app.js"></script>
</body>
</html>

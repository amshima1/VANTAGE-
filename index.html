<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLUX | Premium Mobile</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <div id="mobile-menu" class="mobile-menu">
        <div class="menu-close-bar">
            <button id="close-menu" class="menu-x">&times;</button>
        </div>
        <ul class="menu-list">
            <li><a href="#">New In</a></li>
            <li class="has-arrow"><a href="#">Shop</a></li>
            <li class="has-arrow"><a href="#">Brands</a></li>
            <li><a href="#">Sale</a></li>
            <li class="spacer"></li>
            <li><a href="#" class="sub-link">Sign In</a></li>
            <li><a href="#" class="sub-link">My Wish Lists <span class="wish-count">0</span></a></li>
        </ul>
    </div>

    <header class="main-header">
        <div class="header-top">
            <div id="hamburger-trigger" class="hamburger-icon">
                <span></span><span></span><span></span>
            </div>
            <div class="logo">FLUX</div>
            <div class="cart-trigger" id="cart-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                <span class="cart-badge" id="cart-count">0</span>
            </div>
        </div>
        <div class="search-container">
            <input type="text" placeholder="Search">
            <span class="search-icon">🔍</span>
        </div>
    </header>

    <main id="main-content">
        <div class="section-title">NEW IN</div>
        <div id="product-grid" class="product-grid"></div>
    </main>

    <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>

    <title>FLUX | Luxury Editorial</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">

            <div class="logo">F L U X</div>

        <div class="search-container">

    <main>
        <section class="hero-editorial" style="background-image: url('Flux1-vedio.jpg');">

            </div>
        </section>

        <div class="section-label">NEW ARRIVALS</div>
        <div class="product-scroller" id="flux-arrivals">
            </div>
    </main>

    <script src="app.js"></script>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLUX | Luxury Editorial</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <div id="mobile-menu" class="mobile-drawer">
        <div class="drawer-header">
            <button id="close-menu" class="menu-x">&times;</button>
        </div>
        <nav class="menu-nav">
            <ul class="menu-list">
                <li><a href="#">New In</a></li>
                <li class="has-arrow"><a href="#">Shop</a></li>
                <li class="has-arrow"><a href="#">Brands</a></li>
                <li><a href="#">Sale</a></li>
                <li class="menu-spacer"></li>
                <li><a href="#" class="account-link">Sign In</a></li>
                <li><a href="#" class="account-link">My Wish Lists <span class="wish-badge">0</span></a></li>
            </ul>
        </nav>
    </div>

    <header class="main-header">
        <div class="header-top">
            <div id="menu-trigger" class="header-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="1.5">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </div>
            <div class="logo">F L U X</div>
            <div id="cart-trigger" class="header-icon cart-container">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="1.2">
                    <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <path d="M16 10a4 4 0 0 1-8 0"></path>
                </svg>
                <span class="cart-badge">0</span>
            </div>
        </div>
        <div class="search-row">
            <div class="search-box">
                <input type="text" placeholder="Search">
                <span class="search-icon">🔍</span>
            </div>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="hero-content">
                <h1>SPRING READY?</h1>
                <button class="shop-now">SHOP NOW</button>
            </div>
        </section>

        <div class="section-label">NEW IN</div>
        <div class="product-grid" id="product-grid">
            </div>
    </main>

    <div id="menu-overlay" class="overlay"></div>
    <script src="app.js"></script>
</body>
</html>

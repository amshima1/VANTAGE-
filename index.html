<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLUX | Luxury Editorial</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <div class="logo">F L U X</div>
    </header>

    <main>
        <section class="hero" style="background-image: url('Flux1-vedio.jpg');">
            <div class="hero-content">
                <h1>SPRING READY?</h1>
                <button class="shop-now">SHOP NOW</button>
            </div>
        </section>

        <section class="horizontal-scroller">
            <div class="scroll-wrapper">
                <div class="prop-item">
                    <img src="18063.jpg" alt="Delivery">
                    <h4>Free Standard Delivery</h4>
                    <p>Place an order over £180 and get free delivery.</p>
                    <a href="#">Learn More</a>
                </div>
                </div>
        </section>

        <div class="section-header">
            <h2 class="section-label">NEW ARRIVALS</h2>
            <a href="#" class="view-all">View All</a>
        </div>
        <section class="horizontal-scroller">
            <div class="product-wrapper" id="arrivals-grid">
                </div>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLUX | Luxury Editorial</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <header class="main-header">
        <div class="header-top">
            <div id="menu-trigger" class="header-action">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="1.5">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </div>

            <div class="logo">F L U X</div>

            <div id="cart-trigger" class="header-action cart-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="1.5">
                    <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <path d="M16 10a4 4 0 0 1-8 0"></path>
                </svg>
                <span class="cart-badge">0</span>
            </div>
        </div>

        <div class="header-search">
            <div class="search-input-box">
                <input type="text" placeholder="Search">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </div>
        </div>
    </header>

    <main>
        <section class="hero-section">
            <div class="hero-text">
                <h1>SPRING READY?</h1>
                <button class="shop-btn">SHOP NOW</button>
            </div>
        </section>

        <div class="product-grid">
            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1549060279-7e168fcee0c2?w=800" alt="Product">
                <button class="add-to-cart">ADD TO CART</button>
                <div class="info">
                    <h4>FLUX Meena Structured Wrap</h4>
                    <p>$653.00</p>
                </div>
            </div>
            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1594633313214-29115f035e74?w=800" alt="Product">
                <button class="add-to-cart">ADD TO CART</button>
                <div class="info">
                    <h4>FLUX Lola Kaftan Dress</h4>
                    <p>$416.00</p>
                </div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>

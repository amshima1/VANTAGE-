<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLUX | Official Store</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <header class="main-header">
        <div class="header-top">
            <div id="menu-trigger" class="header-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="1.5">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </div>

            <div class="logo">F L U X</div>

            <div id="cart-trigger" class="header-icon cart-container">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="1.2">
                    <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <path d="M16 10a4 4 0 0 1-8 0"></path>
                </svg>
                <span class="cart-badge">0</span>
            </div>
        </div>

        <div class="search-row">
            <div class="search-box">
                <input type="text" placeholder="Search">
                <span class="search-glass">🔍</span>
            </div>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="hero-content">
                <h1>SPRING READY?</h1>
                <button class="shop-now">SHOP NOW</button>
            </div>
        </section>

        <div class="section-label">NEW IN</div>
        <div class="product-grid">
            <div class="product-card">
                <div class="img-container">
                    <img src="https://images.unsplash.com/photo-1549060279-7e168fcee0c2?w=800" alt="Meena Wrap">
                    <button class="add-to-cart-btn">ADD TO CART</button>
                </div>
                <div class="product-details">
                    <p class="p-name">Hertunba Meena Wrap</p>
                    <p class="p-price">$653.00</p>
                </div>
            </div>
            <div class="product-card">
                <div class="img-container">
                    <img src="https://images.unsplash.com/photo-1594633313214-29115f035e74?w=800" alt="Lola Kaftan">
                    <button class="add-to-cart-btn">ADD TO CART</button>
                </div>
                <div class="product-details">
                    <p class="p-name">Hertunba The Lola Kaftan</p>
                    <p class="p-price">$416.00</p>
                </div>
            </div>
        </div>
    </main>

</body>
</html>

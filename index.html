<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLUX | AI Marketplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="announcement-bar">
        <marquee>SECURE CHECKOUT ENABLED | PAY WITH VISA, MASTERCARD, OR BITCOIN</marquee>
    </div>

    <nav class="navbar">
        <div class="hamburger" id="hamburger" onclick="toggleMenu()">
            <div class="line"></div>
            <div class="line"></div>
            <div class="line"></div>
        </div>

        <div class="logo">FLUX<span>.</span></div>

        <div class="nav-spacer"></div>

        <ul class="nav-links" id="nav-links">
            <li><a href="#shop" onclick="toggleMenu()">Shop</a></li>
            <li><a href="#" onclick="toggleMenu()">Account</a></li>
            <li><button id="cart-icon-btn" class="cart-trigger">Cart (<span id="cart-count">0</span>)</button></li>
        </ul>
    </nav>

    <main class="shop-container" id="shop">
        <div class="product-grid">
            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1546054454-aa26e2b734c7?w=500" class="product-img">
                <div class="product-info">
                    <h3>Flux Phone Z</h3>
                    <div class="stars">⭐⭐⭐⭐⭐</div>
                    <p class="price">$799</p>
                    <button class="add-btn" onclick="addToCart('Flux Phone Z', 799)">Add to Cart</button>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <div class="logo">FLUX<span>.</span></div>
            <p>Your premium destination for tech and trend.</p>
            <div class="footer-links">
                <a href="#">Privacy</a> | <a href="#">Terms</a> | <a href="#">Contact</a>
            </div>
            <p class="copyright">© 2026 FLUX Inc. All Rights Reserved.</p>
        </div>
    </footer>

    <div id="side-cart" class="side-cart">
        <div class="cart-header">
            <h3>Cart</h3>
            <button id="close-cart" onclick="closeCart()">&times;</button>
        </div>
        <div id="cart-items-list" class="cart-content"></div>
        <div class="cart-footer">
            <button class="checkout-btn" onclick="openPayment()">Pay Now</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

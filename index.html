<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLUX | Luxury Editorial</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="header-top">
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="logo">F L U X</div>
            <div class="cart-box">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <path d="M16 10a4 4 0 0 1-8 0"></path>
                </svg>
                <span class="badge">0</span>
            </div>
        </div>
        <div class="search-section">
            <input type="text" placeholder="Search" class="search-input">
        </div>
    </header>

    <main>
        <section class="hero-section" style="background-image: url('Flux1-vedio.jpg');">
            <div class="hero-overlay">
                <h1 class="hero-title">SPRING READY?</h1>
                <button class="shop-btn">SHOP NOW</button>
            </div>
        </section>

        <div class="section-header">
            <h2>New Arrivals</h2>
            <a href="#">View All</a>
        </div>
        <div class="horizontal-scroller" id="product-list">
            </div>
    </main>

    <script src="app.js"></script>
</body>
</html>

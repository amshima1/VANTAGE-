<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vantage E-Commerce</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Header Section -->
    <header>
        <nav>
            <div class="logo">Vantage</div>
            <div class="hamburger-menu" id="hamburger-menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
            <ul class="nav-links" id="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Electronics</a></li>
                <li><a href="#">Clothing</a></li>
                <li><a href="#">Wishlist</a></li>
                <li><a href="#">Cart</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>Discover the Best Deals on Electronics and Fashion</h1>
            <p>Shop now for exclusive offers!</p>
            <a href="#featured" class="btn">Shop Now</a>
        </div>
    </section>

    <!-- Search Bar Section -->
    <div class="search-container">
        <input type="text" id="search-bar" placeholder="Search for products...">
        <button id="search-btn">Search</button>
    </div>

    <!-- Featured Products Section -->
    <section id="featured" class="featured">
        <h2>Featured Products</h2>
        <div class="product-grid" id="product-grid">
            <!-- Products will be dynamically added here -->
        </div>
    </section>

    <!-- Footer Section -->
    <footer>
        <p>&copy; 2026 Vantage E-Commerce. All rights reserved.</p>
        <div class="social-links">
            <a href="#">Facebook</a>
            <a href="#">Instagram</a>
            <a href="#">Twitter</a>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velora | Modern Essentials</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="menu-toggle" id="mobile-menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
            <div class="logo">VELORA<span>.</span></div>
            <div class="cart-icon">
                <span class="icon">👜</span>
                <span id="cart-count">0</span>
            </div>
        </nav>

        <div class="search-section">
            <div class="search-box">
                <input type="text" placeholder="Search products...">
                <span class="search-icon">🔍</span>
            </div>
        </div>

        <ul class="nav-links" id="nav-list">
            <li><a href="#">Home</a></li>
            <li><a href="#">Shop</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </header>

    <div class="menu-overlay" id="overlay"></div>

    <section class="hero">
        <video autoplay muted loop playsinline class="hero-video">
            <source src="18085.mp4" type="video/mp4">
        </video>
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1>The Velora Collection</h1>
            <a href="#featured" class="btn">Shop Now</a>
        </div>
    </section>

    <section class="products-container" id="featured">
        <h2 class="section-title">Featured Collection</h2>
        <div class="product-grid">
            
            <div class="product-card">
                <img src="Flux1-front.jpg" alt="Flux Collection 1">
                <div class="product-info">
                    <h3>Flux Signature I</h3>
                    <p>$120.00</p>
                    <button class="add-btn">Add to Cart</button>
                </div>
            </div>

            <div class="product-card">
                <img src="Flux2-front.jpg" alt="Flux Collection 2">
                <div class="product-info">
                    <h3>Flux Signature II</h3>
                    <p>$145.00</p>
                    <button class="add-btn">Add to Cart</button>
                </div>
            </div>

            <div class="product-card">
                <img src="Flux3-front.jpg" alt="Flux Collection 3">
                <div class="product-info">
                    <h3>Lux Flow Set</h3>
                    <p>$180.00</p>
                    <button class="add-btn">Add to Cart</button>
                </div>
            </div>

            <div class="product-card">
                <img src="Flux4-front.jpg" alt="Flux Collection 4">
                <div class="product-info">
                    <h3>Velora Essential</h3>
                    <p>$95.00</p>
                    <button class="add-btn">Add to Cart</button>
                </div>
            </div>

        </div>
    </section>

    <footer>
        <p>&copy; 2026 VELORA. All Rights Reserved.</p>
    </footer>

    <script src="./script.js"></script>
</body>
</html>

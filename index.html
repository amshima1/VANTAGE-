<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLUX | Luxury Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="site-header">
        <div class="nav-row">
            <div class="menu-icon">☰</div>
            <div class="logo">F L U X</div>
            <div class="cart-box">🛒 <span class="count">0</span></div>
        </div>
        <div class="search-row">
            <input type="text" placeholder="Search" class="search-bar">
        </div>
    </header>

    <main>
        <section class="hero-banner">
            <div class="hero-overlay">
                <h1 class="hero-text">SPRING READY?</h1>
                <button class="hero-button">SHOP NOW</button>
            </div>
        </section>

        <section class="horizontal-scroll" id="arrivals-container">
            </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
